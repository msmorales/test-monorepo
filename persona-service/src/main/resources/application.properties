quarkus.application.name=persona-service
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Cliente gRPC hacia cuenta-service.
# - En OpenShift (mismo pod): CUENTA_GRPC_HOST=localhost (containers comparten red).
# - En docker-compose (contenedores separados): CUENTA_GRPC_HOST=cuenta-service (nombre del servicio).
quarkus.grpc.clients.cuenta.host=${CUENTA_GRPC_HOST:localhost}
quarkus.grpc.clients.cuenta.port=${CUENTA_GRPC_PORT:9000}
quarkus.grpc.clients.cuenta.plain-text=true

%dev.quarkus.log.level=DEBUG
