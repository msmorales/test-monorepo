# ConfigMap: configuracion NO sensible del contenedor cuenta-service.
# Se inyecta como variables de entorno via envFrom en el DeploymentConfig.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cuenta-service-config
  labels:
    app: persona-cuenta
    component: cuenta-service
data:
  QUARKUS_HTTP_PORT: "8081"
  QUARKUS_GRPC_SERVER_PORT: "9000"
